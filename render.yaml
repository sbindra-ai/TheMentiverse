services:
  - type: web
    name: the-mentiverse-web
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: the-mentiverse-postgres
          property: connectionString

databases:
  - name: the-mentiverse-postgres
    plan: starter
    region: oregon
